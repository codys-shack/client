<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Cody's Shack</title>

    <link rel="stylesheet" href="../assets/css/global.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: "Inter", sans-serif;
        }

        .card {
            background-color: #111827;
            border-radius: 12px;
            padding: 48px;
            max-width: 400px;
            width: 100%;
            margin: 20px;
            text-align: center;
            color: #ffffff;
        }

        .icon {
            width: 64px;
            height: 64px;
            background-color: #065f46;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            color: #86efac;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        p {
            color: #9ca3af;
            font-size: 0.9375rem;
            line-height: 1.6;
            margin: 0;
        }

        .notice {
            font-size: 0.8125rem;
            color: #6b7280;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#10003;</div>
        <h1>Payment Successful!</h1>
        <p>Your Premier Pass membership is now active.</p>
        <p class="notice" id="popupNotice">This window will close automatically.</p>
    </div>

    <script>
        if (window.opener) {
            try {
                window.opener.postMessage({ type: 'polar-checkout-done' }, '*');
            } catch (e) {}

            setTimeout(() => {
                window.close();
            }, 2000);
        } else {
            document.getElementById('popupNotice').textContent = 'You can now start playing.';
        }
    </script>
</body>
</html>
