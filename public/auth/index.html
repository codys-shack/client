<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Cody's Shack</title>

    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
        <div class="container">


    <nav id="navbar">
        <a href="/" class="nav-logo"><img src="../assets/images/logos/logo_square.png" alt="Cody's Shack Logo" height="70"></a>
        <ul class="nav-links">
            <li><a href="/catalog/">Games</a></li>
            <li><a href="../how-to-play" id="how-to-play-link">How to Play</a></li>
            <li><a href="../auth/" id="sign-in-link">Sign In</a></li>
            <li><a href="../#memberships" class="button">Play Now</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-card" id="auth-card">
            <h1 id="auth-title">Sign In</h1>
            <p id="auth-subtitle">Sign in to your account to continue.</p>
            
            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" id="submit-btn" class="auth-btn">Sign In</button>
            </form>

            <div class="auth-toggle">
                <p id="toggle-msg">Don't have an account? <a href="/auth/join">Create Account</a></p>
            </div>

            <div id="error-message" class="error-msg"></div>
        </div>

        <div class="auth-card" id="user-profile" style="display: none;">
            <h1>Welcome!</h1>
            <p id="user-email-display"></p>
            <button id="logout-btn" class="auth-btn logout-btn">Log Out</button>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-column">
                <h5>Info</h5>
                <ul>
                    <li><a href="/catalog/">Games</a></li>
                    <li><a href="/#memberships">Memberships</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h5>Quick Links</h5>
                <ul>
                    <li><a href="/help/" target="_blank">Help Desk</a></li>
                    <li><a href="/developers/" target="_blank">Developer Portal</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h5>Socials</h5>
                <ul>
                    <li><a href="" target="_blank">Discord Server</a></li>
                    <li><a href="https://www.youtube.com/@codysshack" target="_blank">YouTube</a></li>
                </ul>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; <span id="currentYear"><script>document.write(new Date().getFullYear());</script></span> Cody's Shack Systems</p>
        </div>
    </footer>
    </div>

    <script type="module" src="../assets/js/global.js"></script>
    <script type="module" src="../assets/js/auth/auth.js"></script>
</body>
</html>
